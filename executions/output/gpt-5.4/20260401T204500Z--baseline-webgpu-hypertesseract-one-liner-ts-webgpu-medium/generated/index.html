<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebGPU Hypertesseract Benchmark v1</title>
    <style>
      :root {
        --bg0: #041018;
        --bg1: #081a28;
        --panel: rgba(7, 14, 22, 0.72);
        --line: rgba(185, 235, 255, 0.92);
        --muted: rgba(189, 208, 223, 0.72);
        --accent: #8ef3ff;
        --warn: #ffd38a;
        --border: rgba(151, 214, 255, 0.16);
        --shadow: rgba(0, 0, 0, 0.38);
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 20%, rgba(20, 106, 143, 0.18), transparent 34%),
          radial-gradient(circle at 80% 12%, rgba(123, 234, 255, 0.08), transparent 26%),
          linear-gradient(180deg, var(--bg1), var(--bg0));
        color: #eef8ff;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      #app {
        position: fixed;
        inset: 0;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .panel {
        position: fixed;
        top: 14px;
        left: 14px;
        width: min(360px, calc(100vw - 28px));
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--panel);
        backdrop-filter: blur(18px) saturate(1.2);
        box-shadow: 0 18px 44px var(--shadow);
        line-height: 1.35;
        pointer-events: none;
      }

      .kicker {
        color: var(--accent);
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }

      .title {
        font-size: 16px;
        margin: 0 0 10px;
      }

      .grid {
        display: grid;
        grid-template-columns: 110px 1fr;
        gap: 4px 10px;
        font-size: 12px;
      }

      .label { color: var(--muted); }
      .value { color: var(--line); }

      .footer {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid rgba(151, 214, 255, 0.12);
        font-size: 11px;
        color: var(--muted);
      }

      .warn {
        color: var(--warn);
      }

      .fallback {
        position: fixed;
        inset: auto 14px 14px 14px;
        max-width: 720px;
        padding: 14px 16px;
        border: 1px solid rgba(255, 211, 138, 0.24);
        border-radius: 14px;
        background: rgba(20, 11, 8, 0.8);
        color: #ffe7b8;
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.34);
        display: none;
      }

      .fallback.visible { display: block; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <aside id="panel" class="panel" aria-label="Benchmark panel"></aside>
    <section id="fallback" class="fallback" aria-live="polite"></section>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
